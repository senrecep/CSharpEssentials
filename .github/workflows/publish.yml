name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Make script executable
        run: chmod +x ./build-and-publish-nugets.sh

      - name: Publish to NuGet
        run: ./build-and-publish-nugets.sh --parallel ${{ secrets.NUGET_API_KEY }}
